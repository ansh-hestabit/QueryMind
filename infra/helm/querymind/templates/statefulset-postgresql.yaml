
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "querymind.fullname" . }}-postgresql
  labels:
    {{- include "querymind.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "querymind.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "querymind.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "querymind.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | default "querymind" }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.auth.password | default "querymind_secret" }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | default "querymind" }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.primary.persistence.size | default "10Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "querymind.fullname" . }}-postgresql
  labels:
    {{- include "querymind.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "querymind.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
